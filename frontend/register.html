<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Become a Donor — HEMA-KHI Portal</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Tailwind Theme overrides -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#760009",
            "on-primary": "#ffffff",
            "primary-container": "#991b1b",
            "on-primary-container": "#ffaaa1",
            "secondary": "#565e74",
            "background": "#f8f9ff",
            "on-background": "#0b1c30",
            "surface": "#ffffff",
            "on-surface": "#0b1c30",
            "outline-variant": "#e1bfbb"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-background font-sans antialiased min-h-screen flex flex-col justify-between">

  <!-- Top bar -->
  <header class="w-full px-8 py-4 flex justify-between items-center border-b border-outline-variant bg-white">
    <a href="/" class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
      <span class="text-md font-bold text-primary">HEMA-KHI Portal</span>
    </a>
    <a href="/login.html" class="text-xs font-semibold text-secondary hover:text-primary transition-colors">Already registered? Log In</a>
  </header>

  <!-- Registration Form Container -->
  <div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl border border-outline-variant shadow-md">
      <div>
        <h2 class="mt-4 text-center text-2xl font-extrabold text-slate-900 tracking-tight">Become a Voluntary Donor</h2>
        <p class="mt-2 text-center text-sm text-slate-500">
          Save lives across Karachi. Register in under 2 minutes.
        </p>
      </div>
      
      <form class="mt-6 space-y-4" id="register-form">
        <div>
          <label for="name" class="block text-xs font-bold text-slate-600 uppercase mb-1">Full Name</label>
          <input id="name" name="name" type="text" required minlength="3" maxlength="100"
            class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary text-sm transition-all" 
            placeholder="e.g. Ahmed Raza">
        </div>
        
        <div>
          <label for="email" class="block text-xs font-bold text-slate-600 uppercase mb-1">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required 
            class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary text-sm transition-all" 
            placeholder="e.g. ahmed.raza@gmail.com">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="phone" class="block text-xs font-bold text-slate-600 uppercase mb-1">Phone Number</label>
            <input id="phone" name="phone" type="tel" required pattern="^\+92\d{10}$"
              class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary text-sm transition-all" 
              placeholder="+923001234567">
            <span class="text-[9px] text-slate-400 mt-1 block">Format: +923XXXXXXXXX</span>
          </div>
          <div>
            <label for="bloodType" class="block text-xs font-bold text-slate-600 uppercase mb-1">Blood Type</label>
            <select id="bloodType" name="bloodType" required
              class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-slate-300 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary text-sm transition-all bg-white">
              <option value="O_positive">O+</option>
              <option value="O_negative">O-</option>
              <option value="A_positive">A+</option>
              <option value="A_negative">A-</option>
              <option value="B_positive">B+</option>
              <option value="B_negative">B-</option>
              <option value="AB_positive">AB+</option>
              <option value="AB_negative">AB-</option>
            </select>
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-bold text-slate-600 uppercase mb-1">Password</label>
          <input id="password" name="password" type="password" required minlength="8"
            class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary text-sm transition-all" 
            placeholder="Min 8 chars, 1 uppercase, 1 lowercase, 1 number">
        </div>

        <div class="flex items-start text-xs pt-2">
          <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded mt-0.5">
          <label for="terms" class="ml-2 block text-slate-600 font-medium">
            I confirm that I am over 18 years of age, weigh at least 50 kg, and have not donated blood in the last 90 days.
          </label>
        </div>

        <button type="submit" id="submit-btn" class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors shadow-sm mt-4">
          Register & Log In
        </button>
      </form>
    </div>
  </div>

  <footer class="w-full py-4 text-center text-[10px] text-slate-500 border-t border-outline-variant bg-white">
    © 2026 Karachi Centralized Blood Bank Portal. Voluntary donations are free of charge.
  </footer>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    Utils.redirectIfLoggedIn();

    const form = document.getElementById('register-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const bloodType = document.getElementById('bloodType').value;
      const password = document.getElementById('password').value;

      // Basic client validations to match backend schema rules
      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
        Utils.showToast('Password must contain at least one uppercase letter, one lowercase letter, and one number.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Registering...";

      try {
        const response = await API.register(name, email, phone, password, bloodType);
        if (response.success) {
          Utils.showToast('Registration successful! Session initialized.', 'success');
          setTimeout(() => {
            window.location.href = '/donor-dashboard.html';
          }, 1200);
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerText = "Register & Log In";
        Utils.showToast(err.message || 'Registration failed. Please check inputs.', 'error');
      }
    });
  </script>
</body>
</html>
